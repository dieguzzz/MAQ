name: metropty
description: Aplicación colaborativa para conocer el estado en tiempo real del Metro de Panamá mediante reportes de usuarios
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  firebase_auth: ^6.1.3
  firebase_messaging: ^16.1.0
  firebase_storage: ^13.0.5
  google_sign_in: ^7.2.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  
  # State Management
  provider: ^6.1.1

  # Utilities
  http: ^1.1.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^19.5.0
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  app_settings: ^5.1.1
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  
  # Ads
  google_mobile_ads: ^7.0.0
  
  # In-App Purchases
  in_app_purchase: ^3.2.0
  cloud_functions: ^6.0.5
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

