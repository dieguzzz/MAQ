name: metropty
description: Aplicación colaborativa para conocer el estado en tiempo real del Metro de Panamá mediante reportes de usuarios
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.17.0
  firebase_messaging: ^14.7.0
  google_sign_in: ^6.1.6
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  
  # State Management
  provider: ^6.1.1

  # Utilities
  http: ^1.1.0
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.2
  google_fonts: ^6.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  
  # Ads
  google_mobile_ads: ^5.0.0
  
  # In-App Purchases
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

