org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
# Usar classpath completo para dexing transform (solución para problemas con nest mates)
android.useFullClasspathForDexingTransform=true
# Deshabilitar compilación paralela para evitar problemas de sincronización
org.gradle.parallel=false
org.gradle.caching=false
android.useAndroidX=true
android.enableJetifier=true

# Deshabilitar compilación incremental de Kotlin para evitar problemas con nest mates
kotlin.incremental=false
kotlin.incremental.js=false
kotlin.incremental.jvm=false

# Suprimir warnings de Java obsoleto
android.suppressUnsupportedCompileSdk=34

# Configuración del caché de Gradle en disco D:
org.gradle.user.home=D:\.gradle
